<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Analytics | AgriTech Pro</title>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="enterprise-theme">
    <nav class="top-nav">
        <div class="nav-left">
            <span class="logo">🛰️ AgriTech<span class="gold">Pro</span></span>
        </div>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="index.html" data-i18n="home">Home</a></li>
                <li><a href="analysis.html" data-i18n="analysis">AI Analysis</a></li>
                <li><a href="market.html" data-i18n="market">Market Trends</a></li>
                <li><a href="forecast.html" class="active" data-i18n="forecast">Weather Hub</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-title">
            <h1 data-i18n="climate_intelligence">Climate Intelligence Dashboard</h1>
            <p data-i18n="climate_subtitle">Advanced weather metrics for precision agriculture.</p>
        </div>

        <div class="forecast-hero card">
            <div class="hero-left">
                <span data-i18n="current_weather">Current Weather</span>
                <h2>26°C</h2>
                <div class="details">
                    <span>💧 57% Humidity</span> | <span>🌬️ 12 km/h Wind</span>
                </div>
            </div>
            <img src="https://cdn-icons-png.flaticon.com/512/1163/1163736.png" alt="weather-icon">
        </div>

        <div class="forecast-grid-horizontal">
            <div id="weather-grid" class="weather-grid full-width">
                <!-- Days will be populated by JS -->
            </div>
        </div>

        <div class="chart-section card">
            <h3>Soil Moisture Trend (%)</h3>
            <div id="chart-area" class="chart-box">
                <div class="bar-chart">
                    <div class="bar" style="height: 60%"></div>
                    <div class="bar" style="height: 40%"></div>
                    <div class="bar" style="height: 80%"></div>
                    <div class="bar" style="height: 50%"></div>
                    <div class="bar" style="height: 70%"></div>
                    <div class="bar" style="height: 45%"></div>
                    <div class="bar" style="height: 65%"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="static/script.js"></script>
</body>
</html>
